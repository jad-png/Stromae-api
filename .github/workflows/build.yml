name: Build and Test Stromae API

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: stromae_test
        options: >-
          --health-cmd="mysqladmin ping" 
          --health-interval=10s 
          --health-timeout=5s 
          --health-retries=3
        ports:
          - 3306:3306

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: Build with Maven
      run: mvn clean install -B
    
    - name: Run Tests
      run: mvn test -B
    
    - name: Generate Coverage Report
      run: mvn jacoco:report
    
    - name: Upload Coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./target/site/jacoco/index.html
    
    - name: Build Docker Images
      run: |
        docker build -t stromae/config-service:latest ./config-service
        docker build -t stromae/discovery-service:latest ./discovery-service
        docker build -t stromae/gateway-service:latest ./gateway-service
        docker build -t stromae/video-service:latest ./video-service
        docker build -t stromae/user-service:latest ./user-service
        docker build -t stromae/security-service:latest ./security-service
        docker build -t stromae/monitoring-service:latest ./monitoring-service
    
    - name: Push to Docker Registry (Optional)
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        echo "Docker images would be pushed here"
        echo "Uncomment and add Docker registry credentials to GitHub Secrets"
